server:
  port: 8080

spring:
  application:
    name: skyways-gateway
  config:
    import: optional:configserver:http://${CONFIG_SERVER_URI:localhost:8888}
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

jwt:
  secret: ${JWT_SECRET:smtCEhx1iX8nJ4uORBK6FQrUf2g7IWYSeZNT5LoAdDqHyc3b}

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: user-service
        url: /user-service/v3/api-docs
      - name: flight-service
        url: /flight-service/v3/api-docs
      - name: booking-service
        url: /booking-service/v3/api-docs
      - name: payment-service
        url: /payment-service/v3/api-docs
      - name: notification-service
        url: /notification-service/v3/api-docs
      - name: saga-orchestrator
        url: /saga-orchestrator/v3/api-docs
  api-docs:
    enabled: true

logging:
  config: classpath:log4j2.xml
